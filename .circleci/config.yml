version: 2.1

# ──────────────────────────────────────────────────────────────────────────────
# PIPELINE PARAMETERS
# Trigger via CircleCI UI → "Run Pipeline" → Add Parameters:
#   environment : qa | stg | prod  (default: qa)
#   action      : deploy | destroy  (default: deploy)
#
# A normal git push always runs the deploy workflow (action defaults to deploy).
# To destroy, trigger manually with action=destroy.
# ──────────────────────────────────────────────────────────────────────────────
parameters:
  environment:
    type: string
    default: "qa"
    description: "Target environment – must match a file in environments/<env>.tfvars"
  action:
    type: enum
    enum: ["deploy", "destroy"]
    default: "deploy"
    description: "deploy = provision resources | destroy = tear down all resources"

# ──────────────────────────────────────────────────────────────────────────────
# EXECUTOR
# ──────────────────────────────────────────────────────────────────────────────
executors:
  terragrunt:
    docker:
      - image: alpine/terragrunt:latest
    working_directory: ~/project
    environment:
      TG_ENV: << pipeline.parameters.environment >>
      AWS_DEFAULT_REGION: ap-south-1
      TERRAGRUNT_NON_INTERACTIVE: "true"
      TF_INPUT: "false"

# ──────────────────────────────────────────────────────────────────────────────
# REUSABLE COMMANDS
# ──────────────────────────────────────────────────────────────────────────────
commands:
  install_aws_cli:
    description: "Install AWS CLI (not bundled in alpine/terragrunt)"
    steps:
      - run:
          name: Install AWS CLI
          command: apk add --no-cache aws-cli

  verify_aws:
    description: "Confirm AWS credentials are working"
    steps:
      - install_aws_cli
      - run:
          name: Verify AWS identity
          command: aws sts get-caller-identity

# ──────────────────────────────────────────────────────────────────────────────
# JOBS
# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # upload-tfvars
  # Uploads environments/<env>.tfvars from the repo to the S3 config bucket.
  # ────────────────────────────────────────────────────────────────────────────
  upload-tfvars:
    executor: terragrunt
    steps:
      - checkout
      - verify_aws
      - run:
          name: "Upload << pipeline.parameters.environment >>.tfvars → S3"
          command: |
            ENV="<< pipeline.parameters.environment >>"
            LOCAL="environments/${ENV}.tfvars"

            CONFIG_BUCKET=$(grep 'config_bucket' backend/backend.hcl | sed 's/.*=\s*"\(.*\)".*/\1/')
            CONFIG_PREFIX=$(grep 'config_prefix' backend/backend.hcl | sed 's/.*=\s*"\(.*\)".*/\1/')
            S3="s3://${CONFIG_BUCKET}/${CONFIG_PREFIX}/${ENV}.tfvars"

            if [ ! -f "${LOCAL}" ]; then
              echo "ERROR: ${LOCAL} not found in repo. Commit it before pushing."
              exit 1
            fi

            echo "Config bucket  : ${CONFIG_BUCKET}"
            echo "Uploading      : ${LOCAL} → ${S3}"
            aws s3 cp "${LOCAL}" "${S3}" --sse aws:kms
            echo "Upload complete."

  # ────────────────────────────────────────────────────────────────────────────
  # init
  # Initialises Terragrunt/Terraform. Reused by both deploy and destroy
  # workflows. Persists .terragrunt-cache to workspace for downstream jobs.
  # ────────────────────────────────────────────────────────────────────────────
  init:
    executor: terragrunt
    steps:
      - checkout
      - verify_aws
      - run:
          name: Terragrunt Init
          command: |
            mkdir -p .tfvars-cache
            terragrunt init
      - persist_to_workspace:
          root: ~/project
          paths:
            - .terragrunt-cache

  # ────────────────────────────────────────────────────────────────────────────
  # plan
  # Saves full plan output as a build artifact for review before apply.
  # ────────────────────────────────────────────────────────────────────────────
  plan:
    executor: terragrunt
    steps:
      - checkout
      - attach_workspace:
          at: ~/project
      - verify_aws
      - run:
          name: Terragrunt Plan
          command: |
            mkdir -p .tfvars-cache
            set -o pipefail
            terragrunt plan 2>&1 | tee /tmp/plan-output.txt
            echo "──── Plan finished ────"
      - store_artifacts:
          path: /tmp/plan-output.txt
          destination: plan-output.txt
      - persist_to_workspace:
          root: ~/project
          paths:
            - .terragrunt-cache

  # ────────────────────────────────────────────────────────────────────────────
  # apply
  # Runs only after the approve-apply manual gate is clicked.
  # ────────────────────────────────────────────────────────────────────────────
  apply:
    executor: terragrunt
    steps:
      - checkout
      - attach_workspace:
          at: ~/project
      - verify_aws
      - run:
          name: Terragrunt Apply
          command: |
            mkdir -p .tfvars-cache
            terragrunt apply -auto-approve
      - run:
          name: Apply complete – summarise outputs
          command: terragrunt output || true
          when: on_success

  # ────────────────────────────────────────────────────────────────────────────
  # destroy
  # Tears down ALL resources in the target environment.
  # Only runs after the approve-destroy manual gate is clicked.
  # Triggered by: Run Pipeline → action=destroy
  # ────────────────────────────────────────────────────────────────────────────
  destroy:
    executor: terragrunt
    steps:
      - checkout
      - attach_workspace:
          at: ~/project
      - verify_aws
      - run:
          name: "Terragrunt Destroy – << pipeline.parameters.environment >>"
          command: |
            mkdir -p .tfvars-cache
            echo "WARNING: About to destroy ALL resources in environment: << pipeline.parameters.environment >>"
            terragrunt destroy -auto-approve

# ──────────────────────────────────────────────────────────────────────────────
# WORKFLOWS
#
# DEPLOY (action=deploy — default on every git push)
# ┌─────────────────────────┐
# │ 1. approve-upload-tfvars│  ← MANUAL GATE
# └────────────┬────────────┘
#              ▼
# ┌─────────────────────────┐
# │ 2. upload-tfvars        │  uploads environments/<env>.tfvars → S3
# └────────────┬────────────┘
#              ▼
# ┌─────────────────────────┐
# │ 3. init                 │  terragrunt init
# └────────────┬────────────┘
#              ▼
# ┌─────────────────────────┐
# │ 4. plan                 │  terragrunt plan  (artifact: plan-output.txt)
# └────────────┬────────────┘
#              ▼
# ┌─────────────────────────┐
# │ 5. approve-apply        │  ← MANUAL GATE (review plan artifact first!)
# └────────────┬────────────┘
#              ▼
# ┌─────────────────────────┐
# │ 6. apply                │  terragrunt apply -auto-approve
# └─────────────────────────┘
#
# DESTROY (action=destroy — only when triggered manually via CircleCI UI)
# ┌─────────────────────────┐
# │ 1. approve-destroy      │  ← MANUAL GATE (confirm you want to destroy)
# └────────────┬────────────┘
#              ▼
# ┌─────────────────────────┐
# │ 2. init                 │  terragrunt init (sets up providers + backend)
# └────────────┬────────────┘
#              ▼
# ┌─────────────────────────┐
# │ 3. destroy              │  terragrunt destroy -auto-approve
# └─────────────────────────┘
# ──────────────────────────────────────────────────────────────────────────────
workflows:

  deploy:
    when:
      equal: [deploy, << pipeline.parameters.action >>]
    jobs:
      - approve-upload-tfvars:
          type: approval

      - upload-tfvars:
          requires:
            - approve-upload-tfvars

      - init:
          requires:
            - upload-tfvars

      - plan:
          requires:
            - init

      - approve-apply:
          type: approval
          requires:
            - plan

      - apply:
          requires:
            - approve-apply

  destroy:
    when:
      equal: [destroy, << pipeline.parameters.action >>]
    jobs:
      - approve-destroy:
          type: approval

      - init:
          requires:
            - approve-destroy

      - destroy:
          requires:
            - init
